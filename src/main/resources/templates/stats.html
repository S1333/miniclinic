<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>掛號統計 - MiniClinic</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #0F2443; border-bottom: 3px solid #14B8A6; padding-bottom: 8px; }
        nav { background: #0F2443; padding: 12px; border-radius: 8px; margin-bottom: 24px; }
        nav a { color: white; margin-right: 20px; text-decoration: none; font-weight: bold; }
        nav a:hover { color: #5EEAD4; }
        .summary { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #F8FAFC; padding: 20px; border-radius: 8px; border-left: 5px solid #14B8A6; flex: 1; text-align: center; }
        .stat-card h2 { margin: 0; font-size: 14px; color: #64748B; }
        .stat-card .value { font-size: 32px; font-weight: bold; color: #0F2443; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #E2E8F0; }
        th { background: #0F2443; color: white; }
    </style>
</head>
<body>
    <nav>
        <a th:href="@{/}">首頁</a>
        <a th:href="@{/doctors}">醫師清單</a>
        <a th:href="@{/appointment/new}">線上掛號</a>
        <a th:href="@{/patients}">病歷資料</a>
        <a th:href="@{/appointments}">掛號記錄</a>
        <a th:href="@{/stats}">統計資訊</a>
        <a th:href="@{/login}">醫師登入</a>  
    </nav>
    </nav>

    <h1>MiniClinic 掛號統計</h1>

    <div class="summary">
        <div class="stat-card">
            <h2>醫師總數</h2>
            <div class="value" th:text="${doctorCount}">0</div>
        </div>
        <div class="stat-card">
            <h2>病患總數</h2>
            <div class="value" th:text="${patientCount}">0</div>
        </div>
        <div class="stat-card">
            <h2>掛號總數</h2>
            <div class="value" th:text="${appointmentCount}">0</div>
        </div>
    </div>

    <h2>各科別掛號數</h2>
    <table>
        <thead>
            <tr>
                <th>科別</th>
                <th>掛號數量</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="stat : ${deptStats}">
                <td th:text="${stat[0]}">科別</td>
                <td th:text="${stat[1]}">0</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
